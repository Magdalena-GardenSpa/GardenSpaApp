<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GardenSpa — Zarządzanie wynajmem</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
<style>
  :root{
    --green:#1b5e20; --green-d:#0f3d13; --green-l:#e8f3e9;
    --bg:#f6f4ee; --card:#ffffff; --ink:#22302a; --muted:#6b7a72; --line:#e3e0d6;
    --warn:#b3541e; --gold:#c9a227;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#eef1ec}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased}
  h1,h2,h3,.brand{font-family:Georgia,"Times New Roman",serif;letter-spacing:.2px}
  a{color:var(--green-d)}
  a:hover{color:var(--green)}
  .app{max-width:460px;margin:0 auto;min-height:100vh;background:var(--bg);display:flex;flex-direction:column;box-shadow:0 0 40px rgba(0,0,0,.08);position:relative}
  .app-header{background:var(--green-d);color:#eaf3ea;padding:20px 18px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:30}
  .app-header img{width:36px;height:36px;border-radius:9px;object-fit:cover;border:2px solid rgba(255,255,255,.3)}
  .app-header .brand{font-size:16px;color:#fff;line-height:1.15}
  .app-header .brand small{display:block;font-size:11px;font-family:-apple-system,sans-serif;opacity:.8;font-weight:normal;letter-spacing:.3px;margin-top:1px}
  .main{flex:1;padding:16px 16px 90px;width:100%}
  nav.bottom{display:flex;border-top:1px solid var(--line);background:#fff;padding:7px 2px 14px;position:sticky;bottom:0;z-index:30}
  nav.bottom button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;border:0;background:none;color:var(--muted);cursor:pointer;font-size:9.5px;padding:6px 2px}
  nav.bottom button .ic{font-size:18px}
  nav.bottom button.active{color:var(--green-d);font-weight:700}
  .topbar{margin-bottom:18px}
  .topbar h1{font-size:20px;color:var(--green-d)}
  .topbar p{color:var(--muted);font-size:12.5px;margin-top:2px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;box-shadow:0 1px 3px rgba(40,50,40,.04)}
  .grid{display:grid;gap:16px}
  .stat{display:flex;flex-direction:column;gap:4px}
  .stat .v{font-size:27px;font-weight:700;font-family:Georgia,serif;color:var(--green-d)}
  .stat .l{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .btn{border:0;border-radius:9px;padding:10px 16px;font-size:14px;cursor:pointer;font-weight:600;display:inline-flex;align-items:center;gap:7px}
  .btn.primary{background:var(--green);color:#fff}
  .btn.primary:hover{background:var(--green-d)}
  .btn.ghost{background:var(--green-l);color:var(--green-d)}
  .btn.ghost:hover{background:#d9ebdb}
  .btn.sm{padding:6px 11px;font-size:12.5px;border-radius:7px}
  .btn.danger{background:#fbeaea;color:#b3261e}
  .btn.gold{background:var(--gold);color:#fff}
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:10px 9px;font-size:13px;border-bottom:1px solid var(--line)}
  th{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:600}
  tr:last-child td{border-bottom:0}
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
  .b-green{background:var(--green-l);color:var(--green-d)}
  .b-amber{background:#fdf0d9;color:#9a6b00}
  .b-red{background:#fbeaea;color:#b3261e}
  .b-blue{background:#e4eef8;color:#23618f}
  .b-grey{background:#eee;color:#555}
  label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:0 0 5px}
  input,select,textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:14px;font-family:inherit;background:#fff;color:var(--ink)}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--green-l);border-color:var(--green)}
  textarea{resize:vertical;min-height:64px}
  .field{margin-bottom:14px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
  .overlay{position:fixed;inset:0;background:rgba(20,30,22,.45);display:flex;align-items:flex-start;justify-content:center;padding:34px 14px;z-index:50;overflow-y:auto}
  .modal{background:#fff;border-radius:16px;width:100%;max-width:640px;padding:24px;box-shadow:0 18px 50px rgba(0,0,0,.25)}
  .modal h2{font-size:20px;color:var(--green-d);margin-bottom:16px}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px;padding-top:16px;border-top:1px solid var(--line)}
  .close-x{float:right;cursor:pointer;font-size:22px;color:var(--muted);border:0;background:none;line-height:1}
  .banner{padding:12px 16px;border-radius:11px;margin-bottom:16px;font-size:13px;display:flex;gap:10px;align-items:flex-start}
  .banner.err{background:#fbeaea;color:#8a2018;border:1px solid #f1c9c4}
  .banner.ok{background:var(--green-l);color:var(--green-d);border:1px solid #cfe6d1}
  .stars{color:var(--gold);letter-spacing:2px;font-size:15px}
  .muted{color:var(--muted)}
  .empty{text-align:center;color:var(--muted);padding:36px 10px;font-size:13.5px}
  .calc-box{background:var(--green-l);border-radius:11px;padding:13px 15px;margin-top:6px}
  .calc-line{display:flex;justify-content:space-between;font-size:13.5px;padding:3px 0}
  .calc-total{display:flex;justify-content:space-between;font-size:17px;font-weight:700;color:var(--green-d);border-top:1px dashed #b8d4bb;margin-top:7px;padding-top:8px;font-family:Georgia,serif}
  .chip{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer;background:#fff}
  .chip.on{background:var(--green-l);border-color:var(--green);color:var(--green-d);font-weight:600}
  .draft{font-size:12px;border:1px solid var(--line);border-radius:9px;padding:8px 10px;cursor:pointer;background:#faf9f5;margin-bottom:6px}
  .draft:hover{background:#f1efe6}
  .swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;display:inline-block;border:1px solid var(--line)}
  .swatch.sel{border:2px solid #1c231d}
  .calcell{aspect-ratio:1;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:12px;box-sizing:border-box}
  @media (max-width:480px){
    .row2,.row3{grid-template-columns:1fr}
    .scroll-x{overflow-x:auto}
    table{min-width:480px}
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useCallback } = React;

/* ============ KONFIGURACJA SUPABASE ============
   Jednorazowo uruchom SQL ze skryptu na końcu tego pliku (w komentarzu) w
   Supabase → SQL Editor, żeby utworzyć potrzebne tabele. Podmień dane poniżej
   swoim URL i kluczem "anon"/"publishable" z Project Settings → API.
*/
const SUPABASE_URL = "https://vgnkrgrmdauwzugskxsc.supabase.co";
const SUPABASE_KEY = "sb_publishable_o_gCTwEbzh2WAen3toyM6A_ttk4i95B";
const H = { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY, "Content-Type": "application/json" };

async function sbGet(table, query=""){
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${query}`, {headers:H});
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbInsert(table, row){
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {method:"POST", headers:{...H,"Prefer":"return=representation"}, body:JSON.stringify(row)});
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbUpdate(table, idCol, idVal, patch){
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${idCol}=eq.${idVal}`, {method:"PATCH", headers:{...H,"Prefer":"return=representation"}, body:JSON.stringify(patch)});
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbDelete(table, idVal){
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${idVal}`, {method:"DELETE", headers:H});
  if(!r.ok) throw new Error(await r.text());
}

const fmt = n => (Number(n)||0).toLocaleString("pl-PL",{maximumFractionDigits:0}) + " zł";
const MONTHS = ['Styczeń','Luty','Marzec','Kwiecień','Maj','Czerwiec','Lipiec','Sierpień','Wrzesień','Październik','Listopad','Grudzień'];
const WEEKDAYS = ['Pn','Wt','Śr','Cz','Pt','So','Nd'];
const COLOR_SWATCHES = ['#153826','#3a6350','#c9a227','#8a5a3b','#5b4b8a','#2f6f8f','#a13d3d'];
const LOGO = "https://ugc.production.linktr.ee/dce7fc8e-f896-412b-b1b8-4a47ce1d35e5_1000001073.jpeg";

function referralCode(phone){ return 'GS'+String(phone||'').replace(/\D/g,'').slice(-4); }
function waPhone(p){ const d=String(p||'').replace(/\D/g,''); return d.startsWith('48')?d:'48'+d; }
function displayName(phone, name){ return name ? name : phone + ' (brak imienia)'; }
function isVoucherExpired(v){ if(!v) return false; const today=new Date(); const u=new Date(v.valid_until); return u < today; }
function isVoucherUsable(v){ return v && !v.redeemed && !isVoucherExpired(v); }
function voucherStatus(v){ if(v.redeemed) return {label:"Wykorzystany",cls:"b-grey"}; if(isVoucherExpired(v)) return {label:"Wygasły",cls:"b-red"}; if(v.linked_offer_id) return {label:"Termin ustalony",cls:"b-blue"}; return {label:"Aktywny",cls:"b-green"}; }
function paymentLabel(p){ return p==="paid_full"?"Opłacony w całości":p==="deposit"?"Zadatek wpłacony":"Nieopłacony"; }
function dateRangeLabel(o){
  const start = new Date(o.year, o.month, o.day);
  const days = o.days||1;
  if(days<=1) return `${o.day}.${o.month+1}.${o.year}`;
  const end = new Date(o.year, o.month, o.day + days - 1);
  const sameMonth = start.getMonth()===end.getMonth() && start.getFullYear()===end.getFullYear();
  if(sameMonth) return `${start.getDate()}-${end.getDate()}.${o.month+1}.${o.year}`;
  return `${start.getDate()}.${start.getMonth()+1} - ${end.getDate()}.${end.getMonth()+1}.${end.getFullYear()}`;
}

function computeCalc(f, equipment, settings, packages, clients, vouchers){
  const eq = equipment.find(e=>e.id===f.equipment_id) || equipment[0] || {};
  const rateOf = (e) => {
    if(f.mode==='weekend') return +e.rate_weekend||0;
    if(f.mode==='week') return +e.rate_week||0;
    const d = new Date(f.year, f.month, f.day).getDay();
    const isW = d===5||d===6||d===0;
    return isW ? (+e.rate_day_weekend||+e.rate_day||0) : (+e.rate_day||0);
  };
  const extraEquip = (f.extra_equip_ids||[]).map(id=>equipment.find(e=>e.id===id)).filter(Boolean);
  const daysRental = (e) => { const q=+f.qty||1; if(f.mode!=='day'||q<=1) return rateOf(e)*q; return rateOf(e) + (q-1)*(+e.rate_extra_day||+e.rate_day||0); };
  let rentalBase, extraRental;
  if(f.rate_override!=null && f.rate_override!==''){ rentalBase = +f.rate_override; extraRental = 0; }
  else { rentalBase = daysRental(eq); extraRental = extraEquip.reduce((s,e)=>s+daysRental(e),0); }
  const freeKm = (+settings.free_km||0) * 4, kmRate = +settings.km_rate||0;
  const kmTotal = (+f.km||0) * 4;
  const billKm = Math.max(0, kmTotal - freeKm);
  const transport = (f.transport_override!=null && f.transport_override!=='') ? +f.transport_override : billKm*kmRate;
  const addonsSum = (f.addon_ids||[]).reduce((s,id)=>{ const p=packages.find(x=>x.id===id); return s+(p?+p.price||0:0); },0);
  const customSum = (f.custom_items||[]).reduce((s,c)=>s+(+c.price||0),0);
  const depositAuto = (+eq.deposit||0) + extraEquip.reduce((s,e)=>s+(+e.deposit||0),0);
  const deposit = (f.deposit_override!=null && f.deposit_override!=='') ? +f.deposit_override : depositAuto;
  const zad = (f.zadatek_override!=null && f.zadatek_override!=='') ? +f.zadatek_override : (+settings.zadatek||0);
  const client = clients.find(c=>c.phone===f.phone);
  const discountPct = (client && client.referral_pct_pending) ? client.referral_pct_pending : 0;
  const discountAmt = Math.round((rentalBase+extraRental) * discountPct / 100);
  const rentalAfterReferral = rentalBase + extraRental - discountAmt;
  const voucher = (vouchers||[]).find(v=>v.code === String(f.voucher_code||'').trim().toUpperCase());
  const voucherUsable = isVoucherUsable(voucher);
  const preVoucherTotal = rentalAfterReferral + transport + addonsSum + customSum + deposit;
  const voucherAmt = voucherUsable ? Math.min(+voucher.value||0, rentalAfterReferral+transport+addonsSum+customSum) : 0;
  const total = preVoucherTotal - voucherAmt;
  const offerCost = +f.offer_cost||0;
  return { rental: rentalAfterReferral, extraEquip, discountAmt, discountPct, transport, addonsSum, customSum, deposit, zadatek: zad, total, billKm, kmTotal, voucher, voucherUsable, voucherAmt, offerCost, eq };
}

function computeExpiry(settings){
  const mode = settings.offer_valid_mode||'hours';
  if(mode==='until_date' && settings.offer_valid_date) return new Date(settings.offer_valid_date+'T23:59:59').toISOString();
  const val = +settings.offer_valid_value||48;
  const ms = mode==='days' ? val*86400000 : val*3600000;
  return new Date(Date.now()+ms).toISOString();
}

function tierLabel(tiers, mode, qty){
  const t = (tiers||[]).find(x=>x.mode===mode);
  if(t && (mode!=='day' || qty===1)) return t.title;
  if(mode==='day') return `${qty} doby relaksu`;
  return 'Wynajem';
}

function reviewDraftOptions(name, city, equipName, equipType, addonNames, voucherUsed){
  const who = name || 'Klient';
  const miejsce = city ? ` (miejscowość: ${city})` : '';
  const co = equipName || 'sprzęt';
  const typSlowo = equipType==='sauna' ? 'sauny' : equipType==='balia' ? 'balii' : 'sprzętu';
  const relaksSlowo = equipType==='sauna' ? 'porządne wygrzanie' : equipType==='balia' ? 'kąpiel pod chmurką' : 'relaks';
  const extra = addonNames && addonNames.length ? ` Skorzystaliśmy też z: ${addonNames.join(', ')}.` : '';
  const voucherLine = voucherUsed ? ' Korzystaliśmy z vouchera podarunkowego — świetny prezent, polecamy dla bliskich!' : '';
  const pool = [
    `${who}${miejsce} — polecam! Wynajęliśmy: ${co} od GardenSpa. Świetna organizacja, czysto i profesjonalnie.${extra}${voucherLine}`,
    `GardenSpa${miejsce} — mobilny wynajem ${typSlowo}: ${co}. Strzał w dziesiątkę na ${relaksSlowo}, zdecydowanie polecam każdemu, kto szuka relaksu blisko domu.${extra}`,
    `Szukaliśmy oferty${miejsce} i trafiliśmy na GardenSpa (${co}) — punktualność, czystość i mega klimat. Na pewno wrócimy!${voucherLine}`,
    `${who} tutaj${miejsce} 🙂 Wszystko dowiezione na czas, ${co} w idealnym stanie. Super sposób na ${relaksSlowo} bez wyjazdu.${extra}`,
    `Nie spodziewaliśmy się takiego komfortu${miejsce}! GardenSpa i ${co} — pełen profesjonalizm od pierwszego kontaktu do odbioru.${voucherLine}`,
    `${co} od GardenSpa${miejsce} to była świetna decyzja — łatwa rezerwacja, miła obsługa, zero stresu.${extra} Chętnie polecimy znajomym.`,
    `Jeśli szukacie ${typSlowo}${miejsce} — GardenSpa i ${co} zdały egzamin na piątkę. Wracamy przy pierwszej okazji.${voucherLine}`,
  ];
  return pool.map(t=>({t,r:Math.random()})).sort((a,b)=>a.r-b.r).map(x=>x.t).slice(0,3);
}

function offerMsg(o, name, settings, equipment, packages, tiers){
  const eq = equipment.find(e=>e.id===o.equipment_id) || {};
  const calc = computeCalc(o, equipment, settings, packages, [], []);
  const addonNames = (o.addon_ids||[]).filter(id=>id!=='p1' && id!=='p7').map(id=>(packages.find(p=>p.id===id)||{}).name).filter(Boolean);
  const greet = name ? `Dzień dobry ${name}!` : 'Dzień dobry!';
  const tierData = (tiers||[]).find(t=>t.mode===o.mode) || {};
  const tier = tierLabel(tiers, o.mode, o.qty);
  let extras = tierData.perks || 'W prezencie od nas: pierwszy worek drewna na rozpalenie 🔥 i światełka na klimat ✨';
  if(addonNames.length) extras += ', a do tego: ' + addonNames.join(', ');
  let nudge = tierData.show_upsell && tierData.upsell_text ? ` ${tierData.upsell_text}` : '';
  const extraNames = (calc.extraEquip||[]).map(e=>e.name);
  const setLine = extraNames.length ? ` + zestaw z: ${extraNames.join(', ')}` : '';
  const customNames = (o.custom_items||[]).filter(c=>c.label).map(c=>`${c.label} (${fmt(c.price)})`);
  const customLine = customNames.length ? `\nDodatkowe ustalenia: ${customNames.join(', ')}.` : '';
  const payableNow = calc.total - calc.deposit;
  return `${greet} Oto Twoja oferta GardenSpa 🌿🛁\n${eq.name}${setLine} — ${tier}\n${extras}.${customLine}\nWynajem: ${fmt(payableNow)} (w tym zadatek ${fmt(calc.zadatek)} przy rezerwacji).\nDodatkowo kaucja zwrotna: ${fmt(calc.deposit)} płatna w dniu wynajmu.${nudge}\n💳 Zadatek szybko przez BLIK na numer: ${settings.blik_phone||''}.\n📅 Terminy znikają szybko — odpisz, żeby zarezerwować ten! Kod polecenia dla znajomych: ${referralCode(o.phone)} — ${settings.referral_pct||0}% zniżki dla Ciebie na kolejny wynajem.`;
}

/* ================= APP ================= */
function App(){
  const [tab,setTab]=useState("pulpit");
  const [err,setErr]=useState(null);
  const [msg,setMsg]=useState(null);
  const [loading,setLoading]=useState(true);

  const [settings,setSettings]=useState({free_km:60,km_rate:2,zadatek:200,referral_pct:15,offer_valid_mode:'hours',offer_valid_value:48,offer_valid_date:'',blik_phone:'',company_name:'GardenSpa'});
  const [equipment,setEquipment]=useState([]);
  const [packages,setPackages]=useState([]);
  const [tiers,setTiers]=useState([]);
  const [clients,setClients]=useState([]);
  const [offers,setOffers]=useState([]);
  const [vouchers,setVouchers]=useState([]);
  const [reviews,setReviews]=useState([]);
  const [costs,setCosts]=useState([]);

  const flash = t => { setMsg(t); setTimeout(()=>setMsg(null),3000); };

  const reload = useCallback(async ()=>{
    setLoading(true); setErr(null);
    try{
      const results = await Promise.allSettled([
        sbGet("gs_settings","id=eq.1"),
        sbGet("gs_equipment","order=name"),
        sbGet("gs_packages","order=name"),
        sbGet("gs_tiers","order=mode"),
        sbGet("gs_clients","order=created_at.desc"),
        sbGet("gs_offers","order=created_at.desc"),
        sbGet("gs_vouchers","order=created_at.desc"),
        sbGet("gs_reviews","order=created_at.desc"),
        sbGet("gs_costs","order=name"),
      ]);
      const [s,e,p,t,c,o,v,r,co] = results;
      if(s.status==="fulfilled" && s.value[0]) setSettings(prev=>({...prev,...s.value[0]}));
      if(e.status==="fulfilled") setEquipment(e.value);
      if(p.status==="fulfilled") setPackages(p.value);
      if(t.status==="fulfilled") setTiers(t.value);
      if(c.status==="fulfilled") setClients(c.value);
      if(o.status==="fulfilled") setOffers((o.value||[]).map(x=>({...x, addon_ids:x.addon_ids||[], extra_equip_ids:x.extra_equip_ids||[], custom_items:x.custom_items||[]})));
      if(v.status==="fulfilled") setVouchers(v.value);
      if(r.status==="fulfilled") setReviews(r.value);
      if(co.status==="fulfilled") setCosts(co.value);
      const failed = results.filter(x=>x.status==="rejected");
      if(failed.length) setErr("Część tabel jeszcze nie istnieje w Supabase — uruchom SQL na dole pliku źródłowego (sekcja komentarza) w SQL Editor. Szczegóły: " + String(failed[0].reason && failed[0].reason.message||failed[0].reason).slice(0,200));
    }catch(ex){ setErr(String(ex.message||ex)); }
    setLoading(false);
  },[]);

  useEffect(()=>{ reload(); },[reload]);

  const NAV = [
    ["pulpit","🏠","Pulpit"],["kalendarz","📅","Kalendarz"],["klienci","📇","Klienci"],
    ["oferty","📄","Oferty"],["opinie","⭐","Opinie"],["raport","📊","Raport"],["ustawienia","⚙️","Ustaw."],
  ];

  return (
    <div className="app">
      <div className="app-header">
        <img src={settings.logo_url||LOGO} alt="logo"/>
        <div className="brand">{settings.company_name||"GardenSpa"}<small>Wynajem balii i sauny</small></div>
      </div>
      <div className="main">

        {msg && <div className="banner ok"><span>✅</span><div>{msg}</div></div>}
        {loading ? <div className="empty">Ładowanie…</div> : (
          <>
            {tab==="pulpit" && <Pulpit {...{equipment,offers,clients,settings,setTab,vouchers}}/>}
            {tab==="kalendarz" && <Kalendarz {...{equipment,offers,clients}}/>}
            {tab==="klienci" && <Klienci {...{clients,setClients,offers,equipment,settings,packages,tiers,vouchers,setOffers,flash,setErr,reload,setTab}}/>}
            {tab==="oferty" && <Oferty {...{offers,setOffers,equipment,packages,tiers,clients,setClients,settings,vouchers,setVouchers,flash,setErr,reload}}/>}
            {tab==="opinie" && <Opinie {...{reviews,setReviews,clients,offers,equipment,packages,vouchers,flash,setErr}}/>}
            {tab==="raport" && <Raport {...{offers,equipment,settings,packages,clients,vouchers,costs}}/>}
            {tab==="ustawienia" && <Ustawienia {...{settings,setSettings,equipment,setEquipment,packages,setPackages,tiers,setTiers,costs,setCosts,flash,setErr,reload}}/>}
          </>

        {NAV.map(([k,ic,l])=>(
          <button key={k} className={tab===k?"active":""} onClick={()=>setTab(k)}>

        ))}
      </nav>
      <div style={{textAlign:"center",fontSize:9,color:"#b7c2ba",padding:"3px 0 2px",background:"#fff"}}>build 2026-07-21-c</div>
    </div>
  );
}

/* ================= PULPIT ================= */
function Pulpit({equipment,offers,clients,settings,setTab,vouchers}){
  const today = new Date();
  const isToday = o => o.year===today.getFullYear() && o.month===today.getMonth() && o.day===today.getDate();
  const todayOffers = offers.filter(o=>isToday(o) && o.status!=="draft");
  const freeCount = equipment.filter(e=>e.status==="available").length;
  const alerts = [];
  offers.forEach(o=>{ if(isToday(o) && o.status!=="draft"){ const eq=equipment.find(e=>e.id===o.equipment_id);
    const c = clients.find(c=>c.phone===o.phone);
    alerts.push({icon:"🚚", text:`Dziś: ${eq?eq.name:"—"} → ${displayName(o.phone,(c&&c.name)||o.name)}`}); } });
  if(!alerts.length) alerts.push({icon:"✓", text:"Brak dzisiejszych dostaw/odbiorów."});
  const todayNum = today.getFullYear()*10000+today.getMonth()*100+today.getDate();
  const dateNum = o => o.year*10000+o.month*100+o.day;
  const upcoming = offers.filter(o=>o.status!=="draft" && !isToday(o) && dateNum(o)>todayNum)
    .sort((a,b)=>dateNum(a)-dateNum(b)).slice(0,4);
  return (
    <div>
      <div className="topbar"><div><h1>Pulpit</h1><p>Wynajem balii i sauny</p></div></div>
      <div className="grid row2" style={{marginBottom:16}}>
        <div className="card stat"><div className="v">{todayOffers.length}</div><div className="l">Dziś dostawy/odbiory</div></div>
        <div className="card stat"><div className="v">{freeCount}</div><div className="l">Wolny sprzęt dziś</div></div>
      </div>
      <div style={{display:"flex",gap:10,marginBottom:20,flexWrap:"wrap"}}>
        <button className="btn primary" onClick={()=>setTab("oferty")}>+ Nowa oferta / kalkulator</button>
        <button className="btn ghost" onClick={()=>setTab("kalendarz")}>Sprawdź dostępność</button>
      </div>
      <h3 style={{fontSize:12.5,color:"var(--muted)",textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>Wymaga uwagi</h3>
      {alerts.map((a,i)=>(<div key={i} className="card" style={{display:"flex",gap:10,alignItems:"center",marginBottom:8,padding:"10px 14px"}}><span>{a.icon}</span><span>{a.text}</span></div>))}
      <h3 style={{fontSize:12.5,color:"var(--muted)",textTransform:"uppercase",letterSpacing:.5,margin:"18px 0 8px"}}>Nadchodzące</h3>
      {upcoming.length===0 && <div className="empty">Brak nadchodzących zleceń.</div>}
      {upcoming.map(o=>{ const eq=equipment.find(e=>e.id===o.equipment_id); const c=clients.find(c=>c.phone===o.phone);
        return (<div key={o.id} className="card" style={{display:"flex",justifyContent:"space-between",marginBottom:8,padding:"10px 14px"}}>
          <span>{eq?eq.name:"—"} · {displayName(o.phone,(c&&c.name)||o.name)}</span><span className="muted">{o.day}.{o.month+1}</span></div>); })}
      {(vouchers||[]).filter(v=>isVoucherUsable(v)).length>0 && <>
        <h3 style={{fontSize:12.5,color:"var(--muted)",textTransform:"uppercase",letterSpacing:.5,margin:"18px 0 8px"}}>🎁 Aktywne vouchery</h3>
        {vouchers.filter(v=>isVoucherUsable(v)).map(v=>{ const buyer=clients.find(c=>c.phone===v.buyer_phone); const st=voucherStatus(v);
          return (<div key={v.id} className="card" style={{display:"flex",justifyContent:"space-between",marginBottom:8,padding:"10px 14px",cursor:"pointer"}} onClick={()=>setTab("oferty")}>
            <span><b>{v.code}</b> · {displayName(v.buyer_phone,(buyer&&buyer.name)||v.buyer_name)}</span>
            <span className={"badge "+st.cls}>{st.label}</span>
          </div>); })}
      </>}
    </div>
  );
}

/* ================= KALENDARZ ================= */
function Kalendarz({equipment,offers,clients}){
  const now = new Date();
  const [ym,setYm]=useState({y:now.getFullYear(),m:now.getMonth()});
  const first = new Date(ym.y,ym.m,1); const last = new Date(ym.y,ym.m+1,0);
  const startOffset = (first.getDay()+6)%7;
  const booked = {};
  offers.filter(o=>o.status!=="draft" && o.year===ym.y && o.month===ym.m).forEach(o=>{
    const eq = equipment.find(e=>e.id===o.equipment_id);
    for(let d=o.day; d<o.day+(o.days||1); d++) booked[d]={color:eq?eq.color||"#153826":"#153826", shape:eq?eq.shape||"square":"square", pending:o.status==="sent", gift:!!o.voucher_code};
  });
  const cells=[]; for(let i=0;i<startOffset;i++) cells.push(null);
  for(let d=1; d<=last.getDate(); d++) cells.push(d);
  const monthOffers = offers.filter(o=>o.status!=="draft" && o.year===ym.y && o.month===ym.m);
  return (
    <div>
      <div className="topbar"><div><h1>Kalendarz</h1><p>Dostępność sprzętu</p></div></div>
      <div className="card">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <button className="btn ghost sm" onClick={()=>{ const d=new Date(ym.y,ym.m-1,1); setYm({y:d.getFullYear(),m:d.getMonth()}); }}>‹</button>
          <b style={{color:"var(--green-d)",fontFamily:"Georgia,serif"}}>{MONTHS[ym.m]} {ym.y}</b>
          <button className="btn ghost sm" onClick={()=>{ const d=new Date(ym.y,ym.m+1,1); setYm({y:d.getFullYear(),m:d.getMonth()}); }}>›</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:4}}>
          {WEEKDAYS.map(d=>(<div key={d} style={{fontSize:11,textAlign:"center",color:"var(--muted)",fontWeight:700}}>{d}</div>))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:14}}>
          {cells.map((d,i)=>{
            if(d==null) return <div key={i} className="calcell" style={{background:"#f8f7f1",border:"none"}}/>;
            const dow=(startOffset+d-1)%7; const isWeekend=dow===5||dow===6;
            const b=booked[d];
            const isCyl = b && b.shape==='cylinder';
            const radius = b ? (b.shape==='round'?'50%':isCyl?'50%/30%':'0px') : '8px';
            const pending = b && b.pending;
            return (<div key={i} className="calcell" style={{
              background:b?b.color:(isWeekend?"#f4ecdc":"#fff"),
              color:b?"#fff":"var(--ink)",
              border:pending?`1.5px dashed ${b.color}`:(isWeekend?"1.5px solid #d8c68a":"1px solid var(--line)"),
              borderRadius:radius,position:"relative",overflow:"hidden"
            }}>
              {isCyl && !pending && <><span style={{position:"absolute",left:0,right:0,top:"28%",height:1,background:"rgba(255,255,255,.45)"}}/><span style={{position:"absolute",left:0,right:0,top:"68%",height:1,background:"rgba(255,255,255,.45)"}}/></>}
              <span style={{position:"relative",zIndex:1}}>{d}</span>
              {b && b.gift && <span style={{position:"absolute",top:-2,right:-1,fontSize:9,zIndex:2}}>🎁</span>}
            </div>);
          })}
        </div>
        <div style={{display:"flex",gap:14,flexWrap:"wrap",fontSize:11,color:"var(--muted)",marginBottom:16}}>
          {equipment.map(e=>(<span key={e.id}><span style={{display:"inline-block",width:12,height:9,background:e.color||"#153826",position:"relative",overflow:"hidden",
            borderRadius:e.shape==='round'?'50%':e.shape==='cylinder'?'50%/30%':2,marginRight:5}}>
            {e.shape==='cylinder' && <><span style={{position:"absolute",left:0,right:0,top:"28%",height:1,background:"rgba(255,255,255,.45)"}}/><span style={{position:"absolute",left:0,right:0,top:"68%",height:1,background:"rgba(255,255,255,.45)"}}/></>}
            </span>{e.name}</span>))}
          <span><span style={{display:"inline-block",width:12,height:9,border:"1.5px dashed #8a8378",borderRadius:2,marginRight:5}}/>Oferta wysłana (oczekuje)</span>
          <span>🎁 Realizacja vouchera</span>
        </div>
        <h3 style={{fontSize:12,color:"var(--muted)",textTransform:"uppercase",marginBottom:8}}>Rezerwacje w tym miesiącu</h3>
        {monthOffers.length===0 && <div className="empty">Brak rezerwacji.</div>}
        {monthOffers.map(o=>{ const eq=equipment.find(e=>e.id===o.equipment_id); const c=clients.find(c=>c.phone===o.phone);
          const calc = computeCalc(o,equipment,{free_km:60,km_rate:2,zadatek:200},[], clients, []);
          return (<div key={o.id} style={{padding:"8px 0",borderBottom:"1px solid var(--line)",fontSize:13}}>
            <b>{eq?eq.name:"—"}</b> · {displayName(o.phone,(c&&c.name)||o.name)} <span className="muted">— {dateRangeLabel(o)} · {fmt(calc.total-calc.deposit)}</span></div>); })}
      </div>
    </div>
  );
}

/* ================= KLIENCI ================= */
function Klienci({clients,setClients,offers,equipment,settings,packages,tiers,vouchers,setOffers,flash,setErr,reload,setTab}){
  const [search,setSearch]=useState("");
  const [selPhone,setSelPhone]=useState(null);
  const digits = search.replace(/\D/g,"");
  const filtered = clients.filter(c=>!digits || c.phone.replace(/\D/g,"").includes(digits));
  const showAddNew = digits.length>=6 && !clients.some(c=>c.phone.replace(/\D/g,"")===digits);
  const sel = clients.find(c=>c.phone===selPhone);

  const addClient = async ()=>{
    try{ const ins = await sbInsert("gs_clients",{phone:search, name:"", city:"", referral_pct_pending:0});
      setClients(p=>[ins[0],...p]); setSelPhone(search); setSearch(""); }
    catch(ex){ setErr(String(ex.message||ex)); }
  };
  const updateClient = async (patch)=>{
    try{ await sbUpdate("gs_clients","id",sel.id,patch); setClients(p=>p.map(c=>c.id===sel.id?{...c,...patch}:c)); }
    catch(ex){ setErr(String(ex.message||ex)); }
  };
  const history = sel ? offers.filter(o=>o.phone===sel.phone) : [];

  if(sel){
    return (
      <div>
        <div className="topbar"><div><h1>Klienci</h1><p>Szczegóły klienta</p></div></div>
        <button className="btn ghost sm" style={{marginBottom:14}} onClick={()=>setSelPhone(null)}>‹ Wszyscy klienci</button>
        <div className="card" style={{marginBottom:16}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><b style={{fontSize:16}}>{displayName(sel.phone,sel.name)}</b></div>
          <div className="muted" style={{marginBottom:4}}>{sel.phone}</div>
          <div style={{fontSize:12,color:"var(--muted)",marginBottom:10}}>Kod polecenia: <b style={{color:"var(--green-d)"}}>{referralCode(sel.phone)}</b></div>
          {sel.referral_pct_pending>0 && <div className="banner ok" style={{fontSize:12}}>🎁 Rabat do wykorzystania: {sel.referral_pct_pending}% na kolejny wynajem</div>}
          <div className="row2">
            <div className="field"><label>Typ klienta</label>
              <select defaultValue={sel.client_type||"private"} onChange={e=>updateClient({client_type:e.target.value})}>
                <option value="private">Osoba fizyczna</option>
                <option value="company">Firma</option>
              </select>
            </div>
            <div className="field"><label>Imię i nazwisko (opcjonalne)</label><input defaultValue={sel.name||""} onBlur={e=>updateClient({name:e.target.value})}/></div>
          </div>
          <div className="row2">
            <div className="field"><label>Miejscowość (opcjonalnie)</label><input defaultValue={sel.city||""} onBlur={e=>updateClient({city:e.target.value})}/></div>
            {(sel.client_type||"private")==="company" && <div className="field"><label>NIP</label><input defaultValue={sel.nip||""} onBlur={e=>updateClient({nip:e.target.value})} placeholder="np. 123-456-32-18"/></div>}
          </div>
          <div style={{display:"flex",gap:8}}>
            <button className="btn primary sm" onClick={()=>setTab("oferty")}>+ Nowa oferta</button>
          </div>
        </div>
        <h3 style={{fontSize:12,color:"var(--muted)",textTransform:"uppercase",marginBottom:8}}>Historia</h3>
        {history.length===0 && <div className="empty">Brak wcześniejszych zleceń.</div>}
        {history.map(o=>{ const eq=equipment.find(e=>e.id===o.equipment_id);
          const calc = computeCalc(o,equipment,settings,packages,clients,vouchers);
          const stMap={draft:["Robocza","b-grey"],sent:["Wysłana","b-blue"],accepted:["Zaakceptowana","b-green"],done:["Zrealizowana","b-amber"]};
          const st = stMap[o.status]||stMap.draft;
          return (<div key={o.id} className="card" style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
            <div><b>{eq?eq.name:"—"}</b><div className="muted" style={{fontSize:12}}>{dateRangeLabel(o)}</div></div>
            <div style={{textAlign:"right"}}><span className={"badge "+st[1]}>{st[0]}</span><div style={{fontWeight:700}}>{fmt(calc.total-calc.deposit)}</div></div>
          </div>); })}
      </div>
    );
  }

  return (
    <div>
      <div className="topbar"><div><h1>Klienci</h1><p>Szukaj po numerze telefonu</p></div></div>
      <div className="field"><input placeholder="np. 600 111 222" value={search} onChange={e=>setSearch(e.target.value)}/></div>
      {filtered.map(c=>(<div key={c.id} className="card" style={{display:"flex",justifyContent:"space-between",marginBottom:8,cursor:"pointer"}} onClick={()=>setSelPhone(c.phone)}>
        <div><b>{displayName(c.phone,c.name)}</b><div className="muted" style={{fontSize:12}}>{c.phone}</div></div>
        <span className="muted">{offers.filter(o=>o.phone===c.phone).length} zlec.</span>
      </div>))}
      {showAddNew && <button className="btn primary" onClick={addClient}>+ Dodaj nowy numer {search}</button>}
      {!filtered.length && !showAddNew && <div className="empty">Wpisz numer, aby wyszukać lub dodać klienta.</div>}
    </div>
  );
}

function Oferty({offers,setOffers,equipment,packages,tiers,clients,setClients,settings,vouchers,setVouchers,flash,setErr}){
  const [modal,setModal]=useState(null); // 'new' or offer object for detail
  const [editingOffer,setEditingOffer]=useState(null);
  const [view,setView]=useState("active"); // active | expired | done
  const [showDeposit,setShowDeposit]=useState(false);
  const [voucherModal,setVoucherModal]=useState(false);
  const [voucherEdit,setVoucherEdit]=useState(null);
  const [voucherTerm,setVoucherTerm]=useState(null);

  const isExpired = o => o.status==="sent" && o.expires_at && new Date(o.expires_at) < new Date();
  const statusOrder = {sent:0,accepted:1,draft:2,done:3};
  const rows = offers.filter(o=>{
    if(view==="vouchers") return false;
    if(view==="done") return o.status==="done";
    if(view==="expired") return isExpired(o);
    return o.status!=="done" && !isExpired(o);
  }).slice().sort((a,b)=>(statusOrder[a.status]??9)-(statusOrder[b.status]??9));

  const openShare = (o, kind) => {
    const c = clients.find(c=>c.phone===o.phone);
    const text = offerMsg(o,(c&&c.name)||o.name,settings,equipment,packages,tiers);
    let url;
    if(kind==="wa") url = `https://wa.me/${waPhone(o.phone)}?text=${encodeURIComponent(text)}`;
    else if(kind==="sms") url = `sms:${o.phone.replace(/\s/g,"")}?body=${encodeURIComponent(text)}`;
    else url = "https://m.me/";
    window.open(url,"_blank");
  };

  const saveOffer = async (f, mode) => {
    try{
      if(!f.phone){ setErr("Podaj numer telefonu klienta."); return; }
      const exists = clients.find(c=>c.phone===f.phone);
      let clientRow = exists;
      if(!exists){ const ins = await sbInsert("gs_clients",{phone:f.phone,name:f.name||"",city:"",referral_pct_pending:0}); clientRow=ins[0]; setClients(p=>[clientRow,...p]); }
      else if(f.name && !exists.name){ await sbUpdate("gs_clients","id",exists.id,{name:f.name}); setClients(p=>p.map(c=>c.id===exists.id?{...c,name:f.name}:c)); }
      // referral reward
      if(f.referral_code){
        const referrer = clients.find(c=>referralCode(c.phone)===String(f.referral_code).trim().toUpperCase() && c.phone!==f.phone);
        if(referrer){ await sbUpdate("gs_clients","id",referrer.id,{referral_pct_pending:settings.referral_pct}); setClients(p=>p.map(c=>c.id===referrer.id?{...c,referral_pct_pending:settings.referral_pct}:c)); }
      }
      // consume own pending discount
      if(exists && exists.referral_pct_pending){ await sbUpdate("gs_clients","id",exists.id,{referral_pct_pending:0}); setClients(p=>p.map(c=>c.id===exists.id?{...c,referral_pct_pending:0}:c)); }
      // redeem voucher
      if(f.voucher_code){
        const v = vouchers.find(v=>v.code===String(f.voucher_code).trim().toUpperCase());
        if(v && isVoucherUsable(v)){ await sbUpdate("gs_vouchers","id",v.id,{redeemed:true}); setVouchers(p=>p.map(x=>x.id===v.id?{...x,redeemed:true}:x)); }
      }
      const status = mode==="log_done" ? "done" : mode==="mark_accepted" ? "accepted" : "draft";
      const body = { phone:f.phone, name:f.name, equipment_id:f.equipment_id, mode:f.mode, qty:f.qty, km:f.km,
        addon_ids:f.addon_ids, extra_equip_ids:f.extra_equip_ids, custom_items:f.custom_items,
        rate_override: f.rate_override===""?null:+f.rate_override, transport_override: f.transport_override===""?null:+f.transport_override,
        zadatek_override: f.zadatek_override===""?null:+f.zadatek_override, deposit_override: f.deposit_override===""?null:+f.deposit_override,
        voucher_code:f.voucher_code, offer_cost:f.offer_cost, year:f.year, month:f.month, day:f.day, days:f.days||f.qty||1, delivery_address:f.delivery_address||"", deposit_returned:!!f.deposit_returned };
      if(f.id){
        const newStatus = f.status||"draft";
        const patch = {...body,status:newStatus};
        if(newStatus==="done") patch.zadatek_paid = true;
        await sbUpdate("gs_offers","id",f.id,patch);
        setOffers(p=>p.map(x=>x.id===f.id?{...x,...patch}:x));
        setModal(null); setEditingOffer(null);
        if(newStatus==="done") setView("done");
        flash(newStatus==="done" ? "Oferta przeniesiona do zarchiwizowanych." : "Zaktualizowano ofertę.");
        return;
      }
      const year = f.year || new Date().getFullYear();
      const sameYear = offers.filter(o=>o.offer_no && o.offer_no.startsWith(`OF/${year}/`));
      const maxN = sameYear.reduce((m,o)=>Math.max(m, parseInt(o.offer_no.split('/')[2])||0), 0);
      const offer_no = `OF/${year}/${String(maxN+1).padStart(4,'0')}`;
      const insertBody = {...body, offer_no, status, expires_at: computeExpiry(settings), zadatek_paid: mode==="log_done"||mode==="mark_accepted"};
      const ins = await sbInsert("gs_offers",insertBody);
      const newOffer = {...ins[0], addon_ids:ins[0].addon_ids||[], extra_equip_ids:ins[0].extra_equip_ids||[], custom_items:ins[0].custom_items||[]};
      setOffers(p=>[newOffer,...p]);
      setModal(null);
      if(mode==="log_done") setView("done");
      if(mode==="draft_send") openShare(newOffer,"wa");
      flash("Zapisano ofertę.");
    }catch(ex){ setErr(String(ex.message||ex)); throw ex; }
  };
  const markVoucherRedeemed = async (v) => {
    try{ await sbUpdate("gs_vouchers","id",v.id,{redeemed:true}); setVouchers(p=>p.map(x=>x.id===v.id?{...x,redeemed:true}:x));
      if(v.linked_offer_id){ await sbUpdate("gs_offers","id",v.linked_offer_id,{status:"done"}); setOffers(p=>p.map(x=>x.id===v.linked_offer_id?{...x,status:"done"}:x)); }
      flash("Voucher oznaczony jako zrealizowany."); }
    catch(ex){ setErr(String(ex.message||ex)); }
  };
  const delVoucher = async (v) => {
    if(!confirm(`Usunąć voucher ${v.code}? Tej operacji nie można cofnąć.`)) return;
    try{ await sbDelete("gs_vouchers",v.id); setVouchers(p=>p.filter(x=>x.id!==v.id)); flash("Usunięto voucher."); }
    catch(ex){ setErr(String(ex.message||ex)); }
  };
  const delOffer = async (o) => {
    if(!confirm("Usunąć tę ofertę/rezerwację? Tej operacji nie można cofnąć.")) return;
    try{ await sbDelete("gs_offers",o.id); setOffers(p=>p.filter(x=>x.id!==o.id)); setModal(null); flash("Usunięto ofertę."); }
    catch(ex){ setErr(String(ex.message||ex)); }
  };

  const advance = async (o) => {
    const order=["draft","sent","accepted","done"]; const i=order.indexOf(o.status); if(i>=order.length-1) return;
    const ns=order[i+1];
    try{ await sbUpdate("gs_offers","id",o.id,{status:ns}); setOffers(p=>p.map(x=>x.id===o.id?{...x,status:ns}:x)); flash("Status: "+ns); }
    catch(ex){ setErr(String(ex.message||ex)); }
  };
  const markSent = async (o) => {
    try{ await sbUpdate("gs_offers","id",o.id,{status:"sent"}); setOffers(p=>p.map(x=>x.id===o.id?{...x,status:"sent"}:x)); }
    catch(ex){ setErr(String(ex.message||ex)); }
  };
  const refreshExpiry = async (o) => {
    try{ const exp=computeExpiry(settings);
      await sbUpdate("gs_offers","id",o.id,{expires_at:exp}); setOffers(p=>p.map(x=>x.id===o.id?{...x,expires_at:exp}:x)); flash("Odświeżono ważność oferty."); }
    catch(ex){ setErr(String(ex.message||ex)); }
  };
  const toggleZadatek = async (o) => {
    try{ await sbUpdate("gs_offers","id",o.id,{zadatek_paid:!o.zadatek_paid}); setOffers(p=>p.map(x=>x.id===o.id?{...x,zadatek_paid:!x.zadatek_paid}:x));
      setModal(m=>m && m.id===o.id ? {...m,zadatek_paid:!m.zadatek_paid} : m); }
    catch(ex){ setErr(String(ex.message||ex)); }
  };

  const expiredCount = offers.filter(isExpired).length;
  const doneCount = offers.filter(o=>o.status==="done").length;

  return (
    <div>
      <div className="topbar"><div><h1>Oferty</h1><p>Wyceny i wysyłka</p></div>
        <div style={{display:"flex",gap:8}}>
          <button className="btn primary" onClick={()=>setModal("new")}>+ Nowa oferta / przelicz cenę</button>
          <button className="btn gold" onClick={()=>setVoucherModal(true)}>🎁 Wystaw voucher</button>
        </div>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
        <button className={"btn sm "+(view==="active"?"primary":"ghost")} onClick={()=>setView("active")}>Aktywne</button>
        <button className={"btn sm "+(view==="expired"?"primary":"ghost")} onClick={()=>setView("expired")}>⏳ Wygasłe ({expiredCount})</button>
        <button className={"btn sm "+(view==="done"?"primary":"ghost")} onClick={()=>setView("done")}>📦 Zarchiwizowane ({doneCount})</button>
        <button className={"btn sm "+(view==="vouchers"?"primary":"ghost")} onClick={()=>setView("vouchers")}>🎁 Vouchery ({vouchers.length})</button>
      </div>
      {view==="vouchers" ? (
        <>
          {vouchers.length===0 && <div className="empty">Brak wystawionych voucherów.</div>}
          {vouchers.slice().sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).map(v=>{
            const st = voucherStatus(v);
            const buyer = clients.find(c=>c.phone===v.buyer_phone);
            const margin = (+(v.agreed_total||v.value)||0) - (+v.cost||0);
            const eq = v.equipment_id && equipment.find(e=>e.id===v.equipment_id);
            return (<div key={v.id} className="card" style={{marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between"}}>
                <div><b>{v.code}</b><div className="muted" style={{fontSize:12}}>{displayName(v.buyer_phone,(buyer&&buyer.name)||v.buyer_name)}{v.recipient_note?" · "+v.recipient_note:""}</div></div>
                <span className={"badge "+st.cls}>{st.label}</span>
              </div>
              {eq && v.linked_offer_id && <div className="muted" style={{fontSize:12,marginTop:4}}>🎁 {eq.name} · {dateRangeLabel(v)}</div>}
              <div style={{display:"flex",gap:16,marginTop:8,fontSize:12.5,flexWrap:"wrap"}}>
                <span>Wartość vouchera: <b>{fmt(v.value)}</b></span>
                {v.agreed_total>0 && <span>Uzgodniona kwota najmu: <b>{fmt(v.agreed_total)}</b></span>}
                <span className="muted">Koszt: {fmt(v.cost||0)}</span>
                <span style={{color:"var(--green-d)",fontWeight:700}}>Marża: {fmt(margin)}</span>
              </div>
              <div style={{marginTop:6}}><span className={"badge "+(v.payment_status==="paid_full"?"b-green":v.payment_status==="deposit"?"b-blue":"b-grey")}>{paymentLabel(v.payment_status)}</span></div>
              <div className="muted" style={{fontSize:11.5,marginTop:4}}>Ważny do {v.valid_until}</div>
              <div style={{display:"flex",gap:8,marginTop:8,flexWrap:"wrap"}}>
                <button className="btn ghost sm" onClick={()=>setVoucherEdit(v)}>✏️ Edytuj</button>
                {!v.redeemed && !v.linked_offer_id && <button className="btn ghost sm" onClick={()=>setVoucherTerm(v)}>📅 Ustal termin realizacji</button>}
                {v.linked_offer_id && !v.redeemed && <button className="btn ghost sm" onClick={()=>markVoucherRedeemed(v)}>✅ Oznacz jako zrealizowany</button>}
                <button className="btn ghost sm" style={{color:"#b3261e",borderColor:"#e3b3ab"}} onClick={()=>delVoucher(v)}>🗑 Usuń</button>
              </div>
            </div>); })}
        </>
      ) : <></>}
      <button type="button" onClick={()=>setShowDeposit(v=>!v)} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,padding:"12px 16px",marginBottom:12,borderRadius:11,border:"1px solid "+(showDeposit?"var(--green)":"var(--line)"),background:showDeposit?"var(--green-l)":"#fff",cursor:"pointer",fontSize:13.5,color:"var(--ink)",fontWeight:600}}>
        <span>💰 {showDeposit?"Kwoty razem z kaucją":"Kwoty bez kaucji"}</span>
        <span style={{width:38,height:22,borderRadius:11,background:showDeposit?"var(--green-d)":"#ccc",position:"relative",flexShrink:0,transition:"background .15s"}}>
          <span style={{position:"absolute",top:2,left:showDeposit?18:2,width:18,height:18,borderRadius:"50%",background:"#fff",transition:"left .15s"}}></span>
        </span>
      </button>
      {view!=="vouchers" && rows.length===0 && <div className="empty">Brak ofert w tym widoku.</div>}
      {view!=="vouchers" && rows.map(o=>{ const eq=equipment.find(e=>e.id===o.equipment_id); const c=clients.find(c=>c.phone===o.phone);
        const calc = computeCalc(o,equipment,settings,packages,clients,vouchers);
        const expired = isExpired(o);
        const stMap={draft:["Robocza","b-grey","Wyślij"],sent:["Wysłana","b-blue","Akceptuj"],accepted:["Zaakceptowana","b-green","Zrealizowano"],done:["Zrealizowana","b-amber",null]};
        const st = stMap[o.status]||stMap.draft;
        const hoursLeft = o.expires_at ? Math.max(0,Math.round((new Date(o.expires_at)-new Date())/3600000)) : null;
        return (<div key={o.id} className="card" style={{marginBottom:10,cursor:"pointer"}} onClick={()=>setModal(o)}>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <div><b>{eq?eq.name:"—"}{calc.extraEquip.length>0?` + ${calc.extraEquip.map(e=>e.name).join(" + ")}`:""}</b><div className="muted" style={{fontSize:12}}>{displayName(o.phone,(c&&c.name)||o.name)} · {dateRangeLabel(o)}</div></div>
            <span className={"badge "+(expired?"b-red":st[1])}>{expired?"Wygasła":st[0]}</span>
          </div>
          <div style={{fontWeight:700,color:"var(--green-d)",marginTop:6}}>{fmt(showDeposit?calc.total:calc.total-calc.deposit)}</div>
          {o.status==="sent" && <div style={{fontSize:11,color:"#9a6b00",marginTop:3}}>⏳ {expired?"Oferta wygasła — odśwież warunki":`Ważna jeszcze ${hoursLeft} godz.`}</div>}
          <div style={{display:"flex",gap:6,marginTop:9,flexWrap:"wrap"}} onClick={e=>e.stopPropagation()}>
            <span className="chip" onClick={()=>openShare(o,"wa")}>🟢 WhatsApp</span>
            <span className="chip" onClick={()=>openShare(o,"sms")}>💬 SMS</span>
            <span className="chip" onClick={()=>openShare(o,"msg")}>📩 Messenger</span>
            {st[2] && !expired && <span className="chip on" onClick={()=>{ if(o.status==="draft") markSent(o); else advance(o); }}>▸ {st[2]}</span>}
            {expired && <span className="chip on" onClick={()=>refreshExpiry(o)}>🔄 Odśwież warunki</span>}
          </div>
        </div>); })}

      {(modal==="new"||editingOffer) && <OfferFormModal onClose={()=>{setModal(null);setEditingOffer(null);}} initial={editingOffer||emptyForm(settings)} equipment={equipment} packages={packages} tiers={tiers} clients={clients} settings={settings} vouchers={vouchers} onSave={saveOffer}/>}
      {modal && modal!=="new" && <OfferDetailModal offer={modal} onClose={()=>setModal(null)} equipment={equipment} packages={packages} tiers={tiers} clients={clients} settings={settings} vouchers={vouchers} onToggleZadatek={toggleZadatek} onEdit={()=>{setEditingOffer(modal);setModal(null);}} onDelete={()=>delOffer(modal)}/>}
      {voucherModal && <VoucherModal onClose={()=>setVoucherModal(false)} settings={settings} clients={clients} setErr={setErr} flash={flash} setVouchers={setVouchers}/>}
      {voucherEdit && <VoucherModal onClose={()=>setVoucherEdit(null)} initial={voucherEdit} settings={settings} clients={clients} setErr={setErr} flash={flash} setVouchers={setVouchers}/>}
      {voucherTerm && <VoucherTermModal voucher={voucherTerm} onClose={()=>setVoucherTerm(null)} equipment={equipment} clients={clients} settings={settings} setErr={setErr} flash={flash} setVouchers={setVouchers} setOffers={setOffers}/>}
    </div>
  );
}

function VoucherModal({onClose,setErr,flash,setVouchers,clients,initial}){
  const [f,setF]=useState(initial || {buyer_phone:"",buyer_name:"",recipient_note:"",value:150,cost:0,agreed_total:0,payment_status:"unpaid",valid_until:new Date(new Date().getFullYear()+1,11,31).toISOString().slice(0,10)});
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const save = async ()=>{
    if(!f.buyer_phone.trim()){ alert("Podaj telefon kupującego, aby utworzyć voucher."); return; }
    try{
      if(f.id){
        const body = {buyer_phone:f.buyer_phone, buyer_name:f.buyer_name, recipient_note:f.recipient_note, value:f.value, cost:f.cost, agreed_total:f.agreed_total, payment_status:f.payment_status, valid_until:f.valid_until};
        await sbUpdate("gs_vouchers","id",f.id,body);
        setVouchers(p=>p.map(x=>x.id===f.id?{...x,...body}:x));
        flash("Zapisano zmiany w voucherze."); onClose(); return;
      }
      const code = "GSGIFT"+String(Date.now()).slice(-4);
      const ins = await sbInsert("gs_vouchers",{code, buyer_phone:f.buyer_phone, buyer_name:f.buyer_name, recipient_note:f.recipient_note, value:f.value, cost:f.cost, agreed_total:f.agreed_total||0, payment_status:f.payment_status||"unpaid", valid_until:f.valid_until, redeemed:false});
      setVouchers(p=>[ins[0],...p]); flash("Utworzono voucher "+code); onClose();
    }catch(ex){ setErr(String(ex.message||ex)); }
  };
  return (
    <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal">
        <button className="close-x" onClick={onClose}>×</button>
        <h2>🎁 {f.id?`Edytuj voucher ${f.code}`:"Voucher podarunkowy"}</h2>
        <div className="row2">
          <div className="field"><label>Telefon kupującego</label><input list="dl-v-phones" value={f.buyer_phone} onChange={e=>{const v=e.target.value; set("buyer_phone",v); const c=clients.find(x=>x.phone===v); if(c) setF(p=>({...p,buyer_phone:v,buyer_name:c.name||p.buyer_name}));}} placeholder="600 111 222"/>
            <datalist id="dl-v-phones">{clients.map(c=><option key={c.id} value={c.phone}>{c.name}</option>)}</datalist>
          </div>
          <div className="field"><label>Imię kupującego (opcjonalne)</label><input list="dl-v-names" value={f.buyer_name} onChange={e=>{const v=e.target.value; set("buyer_name",v); const c=clients.find(x=>x.name===v); if(c) setF(p=>({...p,buyer_name:v,buyer_phone:c.phone||p.buyer_phone}));}}/>
            <datalist id="dl-v-names">{clients.filter(c=>c.name).map(c=><option key={c.id} value={c.name}>{c.phone}</option>)}</datalist>
          </div>
        </div>
        <div className="field"><label>Dla kogo / okazja (notatka)</label><input value={f.recipient_note} onChange={e=>set("recipient_note",e.target.value)} placeholder="np. na urodziny córki"/></div>
        <div className="row2">
          <div className="field"><label>Kwota vouchera (zł)</label><input type="number" value={f.value} onChange={e=>set("value",+e.target.value||0)}/></div>
          <div className="field"><label>Ważny do</label><input type="date" value={f.valid_until} onChange={e=>set("valid_until",e.target.value)}/></div>
        </div>
        <div className="row2">
          <div className="field"><label>Uzgodniona łączna kwota najmu (zł, bez kaucji)</label>
            <div className="muted" style={{fontSize:11,marginBottom:4}}>Wypełnij po ustaleniu z klientem — może być wyższa niż wartość vouchera</div>
            <input type="number" value={f.agreed_total||0} onChange={e=>set("agreed_total",+e.target.value||0)}/></div>
          <div className="field"><label>Status płatności</label>
            <select value={f.payment_status||"unpaid"} onChange={e=>set("payment_status",e.target.value)}>
              <option value="unpaid">Nieopłacony</option><option value="deposit">Zadatek wpłacony</option><option value="paid_full">Opłacony w całości</option>
            </select>
          </div>
        </div>
        <div className="field"><label>Koszt własny wystawienia (zł) — do marży</label>
          <div className="muted" style={{fontSize:11,marginBottom:4}}>np. jeśli voucher sprzedany taniej niż realna wartość usługi</div>
          <input type="number" value={f.cost} onChange={e=>set("cost",+e.target.value||0)}/></div>
        <div className="modal-actions"><button className="btn primary" onClick={save}>{f.id?"Zapisz zmiany":"Utwórz voucher"}</button></div>
      </div>
    </div>
  );
}

function VoucherTermModal({voucher,onClose,equipment,clients,settings,setErr,flash,setVouchers,setOffers}){
  const today = new Date();
  const buyer = clients.find(c=>c.phone===voucher.buyer_phone);
  const [f,setF]=useState({equipment_id:equipment[0]?equipment[0].id:"", days:1, year:today.getFullYear(), month:today.getMonth(), day:today.getDate(), delivery_address:(buyer&&buyer.address)||""});
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const save = async ()=>{
    if(!f.equipment_id){ alert("Wybierz sprzęt."); return; }
    try{
      const offerBody = { phone:voucher.buyer_phone, name:(buyer&&buyer.name)||voucher.buyer_name||"", equipment_id:f.equipment_id, mode:"day", qty:f.days, km:0,
        addon_ids:[], extra_equip_ids:[], custom_items:[], rate_override: f.days>0 ? Math.round((voucher.agreed_total||voucher.value||0)/f.days) : 0,
        transport_override:0, zadatek_override:0, deposit_override:null, voucher_code:voucher.code, offer_cost:0,
        year:f.year, month:f.month, day:f.day, days:f.days, delivery_address:f.delivery_address, status:"accepted", zadatek_paid:true };
      const ins = await sbInsert("gs_offers",offerBody);
      setOffers(p=>[ins[0],...p]);
      await sbUpdate("gs_vouchers","id",voucher.id,{linked_offer_id:ins[0].id, equipment_id:f.equipment_id, year:f.year, month:f.month, day:f.day, days:f.days});
      setVouchers(p=>p.map(x=>x.id===voucher.id?{...x,linked_offer_id:ins[0].id, equipment_id:f.equipment_id, year:f.year, month:f.month, day:f.day, days:f.days}:x));
      flash("Ustalono termin realizacji vouchera — wpisano do kalendarza."); onClose();
    }catch(ex){ setErr(String(ex.message||ex)); }
  };
  return (
    <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal">
        <button className="close-x" onClick={onClose}>×</button>
        <h2>📅 Ustal termin realizacji — {voucher.code}</h2>
        <div className="field"><label>Sprzęt</label>
          <select value={f.equipment_id} onChange={e=>set("equipment_id",e.target.value)}>
            {equipment.map(e=><option key={e.id} value={e.id}>{e.name}</option>)}
          </select>
        </div>
        <div className="row2">
          <div className="field"><label>Data rozpoczęcia</label><input type="date" value={`${f.year}-${String(f.month+1).padStart(2,'0')}-${String(f.day).padStart(2,'0')}`} onChange={e=>{ const [y,m,d]=e.target.value.split('-').map(Number); setF(p=>({...p,year:y,month:m-1,day:d})); }}/></div>
          <div className="field"><label>Ilość dób</label><input type="number" min="1" value={f.days} onChange={e=>set("days",+e.target.value||1)}/></div>
        </div>
        <div className="field"><label>Adres dostawy</label><input value={f.delivery_address} onChange={e=>set("delivery_address",e.target.value)}/></div>
        <div className="muted" style={{fontSize:12}}>Wpis pojawi się w kalendarzu i w ofertach oznaczony 🎁. Kaucja rozliczana standardowo jak przy zwykłym wynajmie.</div>
        <div className="modal-actions"><button className="btn primary" onClick={save}>Zapisz termin</button></div>
      </div>
    </div>
  );
}

/* ================= OPINIE ================= */
function ReviewModal({onClose,client,offers,equipment,packages,vouchers,settings,setReviews,flash,setErr}){
  const lastOffer = client ? offers.filter(o=>o.phone===client.phone && o.status!=="draft").sort((a,b)=>(b.year*10000+b.month*100+b.day)-(a.year*10000+a.month*100+a.day))[0] : null;
  const eq = lastOffer && equipment.find(e=>e.id===lastOffer.equipment_id);
  const addonNames = lastOffer ? (lastOffer.addon_ids||[]).filter(id=>id!=="p1").map(id=>(packages.find(p=>p.id===id)||{}).name).filter(Boolean) : [];
  const voucherUsed = lastOffer ? vouchers.some(v=>v.redeemed && v.buyer_phone===client.phone) : false;
  const [phone,setPhone]=useState(client?client.phone:"");
  const [text,setText]=useState(`Dzień dobry${client&&client.name?" "+client.name:""}! Dziękujemy za skorzystanie z GardenSpa${eq?" po wynajmie "+eq.name.toLowerCase():""}${client&&client.city?" w "+client.city:""} 🌿 Macie 5 sekund? Odpiszcie nam oceną 1-5 ⭐ i jednym zdaniem, co Wam się podobało — to dla nas naprawdę dużo znaczy!`);
  const [stars,setStars]=useState(5);
  const [reviewText,setReviewText]=useState("");
  const drafts = useMemo(()=>reviewDraftOptions(client&&client.name, client&&client.city, eq&&eq.name, eq&&eq.type, addonNames, voucherUsed),[client]);

  const send = kind => { const url = kind==="wa" ? `https://wa.me/${waPhone(phone)}?text=${encodeURIComponent(text)}` : `sms:${phone.replace(/\s/g,"")}?body=${encodeURIComponent(text)}`; window.open(url,"_blank"); };
  const save = async ()=>{
    if(!reviewText){ onClose(); return; }
    try{ const ins = await sbInsert("gs_reviews",{phone, name:(client&&client.name)||"", stars, text:reviewText, web:false, fb:false, ig:false});
      setReviews(p=>[ins[0],...p]); flash("Zapisano opinię."); onClose(); }
    catch(ex){ setErr(String(ex.message||ex)); }
  };

  return (
    <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal">
        <button className="close-x" onClick={onClose}>×</button>
        <h2>Poproś o opinię</h2>
        <div className="field"><label>Telefon</label><input value={phone} onChange={e=>setPhone(e.target.value)} placeholder="600 111 222"/></div>
        <div className="field"><label>Treść wiadomości</label><textarea value={text} onChange={e=>setText(e.target.value)}/></div>
        <div style={{display:"flex",gap:8,marginBottom:16}}>
          <button className="btn primary" onClick={()=>send("wa")}>🟢 WhatsApp</button>

/* ================= RAPORT ================= */
function Raport({offers,equipment,settings,packages,clients,vouchers,costs}){
  const [period,setPeriod]=useState("month");
  const [showRoi,setShowRoi]=useState(false);
  const monthlyCosts = costs.filter(c=>c.period==="monthly").reduce((s,c)=>s+(+c.amount||0),0);
  const oneOffCosts = costs.filter(c=>c.period==="once").reduce((s,c)=>s+(+c.amount||0),0);
  const totalInvestment = equipment.reduce((s,e)=>s+(+e.purchase_cost||0),0);
  const netOf = (o,calc) => calc.total - calc.deposit - (+o.offer_cost||0);
  const revenueForOffers = (list) => list.reduce((s,o)=>{ const calc = computeCalc(o,equipment,settings,packages,clients,vouchers); return s+netOf(o,calc); },0);
  const realized = offers.filter(o=>o.status==="done"||o.status==="accepted");
  const today = new Date();

  const perEquipment = equipment.map(e=>{
    const eqOffers = realized.filter(o=>o.equipment_id===e.id);
    const revenue = revenueForOffers(eqOffers);
    const roiPct = e.purchase_cost>0 ? Math.round((revenue/e.purchase_cost)*100) : 0;
    return {name:e.name, revenue, count:eqOffers.length, roiPct, purchase_cost:e.purchase_cost||0};
  }).sort((a,b)=>b.revenue-a.revenue);

  const periodKey = o => period==="year" ? `${o.year}` : period==="quarter" ? `${o.year}-Q${Math.floor(o.month/3)+1}` : `${o.year}-${o.month}`;
  const periodLabel = key => { if(period==="year") return key; if(period==="quarter"){ const [y,q]=key.split("-Q"); return `${q} kw. ${y}`; } const [y,m]=key.split("-").map(Number); return `${MONTHS[m]} ${y}`; };
  const byPeriod={}; realized.forEach(o=>{ const k=periodKey(o); (byPeriod[k]=byPeriod[k]||[]).push(o); });
  const periodSummary = Object.keys(byPeriod).sort().map(k=>{
    const list=byPeriod[k]; const rev=revenueForOffers(list); const net=rev-monthlyCosts;
    const byEq={}; list.forEach(o=>{ const calc=computeCalc(o,equipment,settings,packages,clients,vouchers); byEq[o.equipment_id]=(byEq[o.equipment_id]||0)+netOf(o,calc); });
    let bestId=null,bestRev=-1; Object.entries(byEq).forEach(([id,r])=>{ if(r>bestRev){bestRev=r;bestId=id;} });
    const bestEq = equipment.find(e=>e.id===bestId);
    return {label:periodLabel(k), revenue:rev, net, count:list.length, bestName:bestEq?bestEq.name:"—", bestRev:bestRev>0?bestRev:0};
  }).reverse();

  const curKey = periodKey({year:today.getFullYear(),month:today.getMonth()});
  const thisMonthRevenue = revenueForOffers(byPeriod[curKey]||[]);
  const thisMonthNet = thisMonthRevenue - monthlyCosts;
  const marginPct = thisMonthRevenue>0 ? Math.round((thisMonthNet/thisMonthRevenue)*100) : 0;
  const allTimeRevenue = revenueForOffers(realized);
  const allTimeCosts = monthlyCosts*Math.max(1,Object.keys(byPeriod).length||1) + oneOffCosts;
  const allTimeNet = allTimeRevenue - allTimeCosts;
  const roiPct = totalInvestment>0 ? Math.round((allTimeNet/totalInvestment)*100) : 0;

  return (
    <div>
      <div className="topbar"><div><h1>Raport</h1><p>Przychody, koszty, ROI</p></div></div>
      <div className="grid row2" style={{marginBottom:12}}>
        <div className="card stat"><div className="v">{fmt(thisMonthRevenue)}</div><div className="l">Przychód (ten miesiąc)</div></div>
        <div className="card stat"><div className="v" style={{color:"#b3261e"}}>{fmt(monthlyCosts)}</div><div className="l">Koszty (miesięcznie)</div></div>
      </div>
      <div className="grid row2" style={{marginBottom:16}}>
        <div className="card stat"><div className="v" style={{color:thisMonthNet>=0?"var(--green-d)":"#b3261e"}}>{fmt(thisMonthNet)}</div><div className="l">Zysk netto (ten miesiąc)</div></div>
        <div className="card stat"><div className="v">{marginPct}%</div><div className="l">Marża</div></div>
      </div>
      <h3 style={{fontSize:12,color:"var(--muted)",textTransform:"uppercase",marginBottom:8}}>ROI — zwrot z inwestycji w sprzęt</h3>
      <div className="card" style={{marginBottom:10}}>
        <div className="calc-line"><span>Inwestycja w sprzęt (łącznie)</span><span>{fmt(totalInvestment)}</span></div>
        <div className="calc-line"><span>Przychód od początku</span><span>{fmt(allTimeRevenue)}</span></div>
        <div className="calc-line"><span>Zysk netto od początku</span><span>{fmt(allTimeNet)}</span></div>
        <div className="calc-total"><span>ROI</span><span>{roiPct}%</span></div>
      </div>
      <button className="btn ghost sm" style={{marginBottom:12}} onClick={()=>setShowRoi(v=>!v)}>{showRoi?"▾ Ukryj podział na sprzęt":"▸ Pokaż ROI per sprzęt"}</button>
      {showRoi && perEquipment.map((e,i)=>(<div key={i} className="card" style={{marginBottom:8}}>
        <div style={{display:"flex",justifyContent:"space-between",fontWeight:700,color:"var(--green-d)"}}><span>{e.name}</span><span>{e.roiPct}%</span></div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"var(--muted)",marginTop:3}}><span>Przychód: {fmt(e.revenue)} · {e.count} zlec.</span><span>Inwestycja: {fmt(e.purchase_cost)}</span></div>
      </div>))}
      <h3 style={{fontSize:12,color:"var(--muted)",textTransform:"uppercase",margin:"18px 0 8px"}}>Podsumowanie okresowe</h3>
      <div style={{display:"flex",gap:6,marginBottom:10}}>
        {["month","quarter","year"].map(p=>(<button key={p} className={"btn sm "+(period===p?"primary":"ghost")} onClick={()=>setPeriod(p)}>{p==="month"?"Miesiąc":p==="quarter"?"Kwartał":"Rok"}</button>))}
      </div>
      {periodSummary.length===0 && <div className="empty">Brak zrealizowanych/zaakceptowanych zleceń do podsumowania.</div>}
      {periodSummary.map((m,i)=>(<div key={i} className="card" style={{marginBottom:8}}>
        <div style={{display:"flex",justifyContent:"space-between",fontWeight:700,color:"var(--green-d)"}}><span>{m.label}</span><span className="muted" style={{fontWeight:400}}>{m.count} zlec.</span></div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginTop:3}}><span className="muted">Przychód: {fmt(m.revenue)}</span><span style={{color:m.net>=0?"var(--green-d)":"#b3261e",fontWeight:700}}>Netto: {fmt(m.net)}</span></div>
        {m.bestRev>0 && <div style={{fontSize:11,color:"#9a6b00",marginTop:3}}>🏆 Najlepszy: {m.bestName} ({fmt(m.bestRev)})</div>}
      </div>))}
      <div className="muted" style={{fontSize:11,marginTop:10}}>Koszty edytujesz w Ustawienia → Koszty stałe. Koszt zakupu sprzętu edytujesz przy każdej pozycji w Ustawienia → Sprzęt.</div>
    </div>
  );
}

/* ================= USTAWIENIA ================= */
function Ustawienia({settings,setSettings,equipment,setEquipment,packages,setPackages,tiers,setTiers,costs,setCosts,flash,setErr,reload}){
  const saveSettings = async (patch) => {
    try{ await sbUpdate("gs_settings","id",1,patch); setSettings(p=>({...p,...patch})); flash("Zapisano ustawienia."); }
    catch(ex){ setErr(String(ex.message||ex)); }
  };
  const updEquip = async (id,patch) => { try{ await sbUpdate("gs_equipment","id",id,patch); setEquipment(p=>p.map(e=>e.id===id?{...e,...patch}:e)); }catch(ex){setErr(String(ex.message||ex));} };
  const addEquip = async () => { try{ const ins = await sbInsert("gs_equipment",{name:"Nowy sprzęt",type:"balia",shape:"square",capacity:"",rate_day:250,rate_day_weekend:300,rate_weekend:400,rate_week:1200,deposit:200,purchase_cost:0,color:"#153826",status:"available"}); setEquipment(p=>[...p,ins[0]]); }catch(ex){setErr(String(ex.message||ex));} };
  const delEquip = async (id) => { if(!confirm("Usunąć ten sprzęt?"))return; try{ await sbDelete("gs_equipment",id); setEquipment(p=>p.filter(e=>e.id!==id)); }catch(ex){setErr(String(ex.message||ex));} };

  const updPkg = async (id,patch) => { try{ await sbUpdate("gs_packages","id",id,patch); setPackages(p=>p.map(x=>x.id===id?{...x,...patch}:x)); }catch(ex){setErr(String(ex.message||ex));} };
  const addPkg = async () => { try{ const ins = await sbInsert("gs_packages",{name:"Nowy pakiet",price:0,note:""}); setPackages(p=>[...p,ins[0]]); }catch(ex){setErr(String(ex.message||ex));} };
  const delPkg = async (id) => { try{ await sbDelete("gs_packages",id); setPackages(p=>p.filter(x=>x.id!==id)); }catch(ex){setErr(String(ex.message||ex));} };

  const updTier = async (id,patch) => { try{ await sbUpdate("gs_tiers","id",id,patch); setTiers(p=>p.map(t=>t.id===id?{...t,...patch}:t)); }catch(ex){setErr(String(ex.message||ex));} };

  const updCost = async (id,patch) => { try{ await sbUpdate("gs_costs","id",id,patch); setCosts(p=>p.map(c=>c.id===id?{...c,...patch}:c)); }catch(ex){setErr(String(ex.message||ex));} };
  const addCost = async () => { try{ const ins = await sbInsert("gs_costs",{name:"Nowy koszt",amount:0,period:"monthly"}); setCosts(p=>[...p,ins[0]]); }catch(ex){setErr(String(ex.message||ex));} };
  const delCost = async (id) => { try{ await sbDelete("gs_costs",id); setCosts(p=>p.filter(c=>c.id!==id)); }catch(ex){setErr(String(ex.message||ex));} };

  return (
    <div>
      <div className="topbar"><div><h1>Ustawienia</h1><p>Sprzęt, pakiety, ceny</p></div></div>

      <h3 style={{fontSize:12,color:"var(--muted)",textTransform:"uppercase",marginBottom:8}}>Sprzęt</h3>
      {equipment.map(e=>(<div key={e.id} className="card" style={{marginBottom:10}}>
        <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:8}}>
          <input style={{fontWeight:700,flex:1}} defaultValue={e.name} onBlur={ev=>updEquip(e.id,{name:ev.target.value})}/>
          <select defaultValue={e.status} onChange={ev=>updEquip(e.id,{status:ev.target.value})} style={{width:130}}>
            <option value="available">Dostępny</option><option value="rented">Wynajęty</option><option value="service">Serwis</option>
          </select>
          <button className="btn danger sm" onClick={()=>delEquip(e.id)}>Usuń</button>
        </div>
        <div style={{display:"flex",gap:6,marginBottom:8}}>
          {COLOR_SWATCHES.map(c=>(<span key={c} className={"swatch"+(e.color===c?" sel":"")} style={{background:c}} onClick={()=>updEquip(e.id,{color:c})}/>))}
        </div>
        <div className="row3" style={{marginBottom:8}}>
          <div><label>Doba (pon-czw)</label><input type="number" defaultValue={e.rate_day} onBlur={ev=>updEquip(e.id,{rate_day:+ev.target.value||0})}/></div>
          <div><label>Doba (pt-nd)</label><input type="number" defaultValue={e.rate_day_weekend} onBlur={ev=>updEquip(e.id,{rate_day_weekend:+ev.target.value||0})}/></div>
          <div><label>Kolejna doba</label><input type="number" defaultValue={e.rate_extra_day} onBlur={ev=>updEquip(e.id,{rate_extra_day:+ev.target.value||0})}/></div>
          <div><label>Kaucja</label><input type="number" defaultValue={e.deposit} onBlur={ev=>updEquip(e.id,{deposit:+ev.target.value||0})}/></div>
        </div>
        <div className="row3">
          <div><label>Pakiet weekendowy</label><input type="number" defaultValue={e.rate_weekend} onBlur={ev=>updEquip(e.id,{rate_weekend:+ev.target.value||0})}/></div>
          <div><label>Pakiet tygodniowy</label><input type="number" defaultValue={e.rate_week} onBlur={ev=>updEquip(e.id,{rate_week:+ev.target.value||0})}/></div>
          <div><label>Koszt zakupu</label><input type="number" defaultValue={e.purchase_cost} onBlur={ev=>updEquip(e.id,{purchase_cost:+ev.target.value||0})}/></div>
        </div>
      </div>))}
      <button className="btn ghost" style={{marginBottom:20}} onClick={addEquip}>+ Dodaj sprzęt (np. druga sauna)</button>

      <h3 style={{fontSize:12,color:"var(--muted)",textTransform:"uppercase",marginBottom:8}}>Pakiety / dodatki</h3>
      {packages.map(p=>(<div key={p.id} className="card" style={{marginBottom:9}}>
        <div style={{display:"flex",gap:8,marginBottom:6}}>
          <input style={{fontWeight:700,flex:1}} defaultValue={p.name} onBlur={ev=>updPkg(p.id,{name:ev.target.value})}/>
          <input type="number" style={{width:90}} defaultValue={p.price} onBlur={ev=>updPkg(p.id,{price:+ev.target.value||0})}/>
        </div>
        <div style={{display:"flex",gap:8}}>
          <input placeholder="opis" style={{flex:1}} defaultValue={p.note} onBlur={ev=>updPkg(p.id,{note:ev.target.value})}/>
          <button className="btn danger sm" onClick={()=>delPkg(p.id)}>Usuń</button>
        </div>
      </div>))}
      <button className="btn ghost" style={{marginBottom:20}} onClick={addPkg}>+ Dodaj pakiet / dodatek</button>

      <h3 style={{fontSize:12,color:"var(--muted)",textTransform:"uppercase",marginBottom:8}}>Warianty ofertowe</h3>
      {tiers.map(t=>(<div key={t.id} className="card" style={{marginBottom:10}}>
        <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:6}}>
          <span>{t.emoji}</span><input style={{fontWeight:700,flex:1}} defaultValue={t.title} onBlur={ev=>updTier(t.id,{title:ev.target.value})}/>
        </div>
        <div className="field"><input placeholder="podtytuł" defaultValue={t.subtitle} onBlur={ev=>updTier(t.id,{subtitle:ev.target.value})}/></div>
        <div className="field"><textarea placeholder="co zawiera" defaultValue={t.perks} onBlur={ev=>updTier(t.id,{perks:ev.target.value})}/></div>
        <label style={{cursor:"pointer"}} onClick={()=>updTier(t.id,{show_upsell:!t.show_upsell})}>{t.show_upsell?"☑":"☐"} Pokaż podpowiedź / zachętę (upsell)</label>
        {t.show_upsell && <textarea placeholder="treść zachęty" defaultValue={t.upsell_text} onBlur={ev=>updTier(t.id,{upsell_text:ev.target.value})}/>}
      </div>))}

      <h3 style={{fontSize:12,color:"var(--muted)",textTransform:"uppercase",margin:"20px 0 8px"}}>Koszty stałe (do raportu)</h3>
      {costs.map(c=>(<div key={c.id} className="card" style={{marginBottom:9}}>
        <div style={{display:"flex",gap:8,marginBottom:6}}>
          <input style={{fontWeight:700,flex:1}} defaultValue={c.name} onBlur={ev=>updCost(c.id,{name:ev.target.value})}/>
          <input type="number" style={{width:90}} defaultValue={c.amount} onBlur={ev=>updCost(c.id,{amount:+ev.target.value||0})}/>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <select defaultValue={c.period} onChange={ev=>updCost(c.id,{period:ev.target.value})}>
            <option value="monthly">Miesięcznie</option><option value="once">Jednorazowo</option>
          </select>
          <button className="btn danger sm" onClick={()=>delCost(c.id)}>Usuń</button>
        </div>
      </div>))}
      <button className="btn ghost" style={{marginBottom:20}} onClick={addCost}>+ Dodaj koszt</button>

      <h3 style={{fontSize:12,color:"var(--muted)",textTransform:"uppercase",marginBottom:8}}>Transport</h3>
      <div className="card row2" style={{marginBottom:20}}>
        <div><label>Darmowe km (w 1 stronę)</label><input type="number" defaultValue={settings.free_km} onBlur={ev=>saveSettings({free_km:+ev.target.value||0})}/></div>
        <div><label>Zł / km powyżej</label><input type="number" defaultValue={settings.km_rate} onBlur={ev=>saveSettings({km_rate:+ev.target.value||0})}/></div>
      </div>

      <h3 style={{fontSize:12,color:"var(--muted)",textTransform:"uppercase",marginBottom:8}}>Płatności i polecenia</h3>
      <div className="card">
        <div className="row2" style={{marginBottom:8}}>
          <div><label>Zadatek przy rezerwacji (zł)</label><input type="number" defaultValue={settings.zadatek} onBlur={ev=>saveSettings({zadatek:+ev.target.value||0})}/></div>
          <div><label>Rabat za polecenie (%)</label><input type="number" defaultValue={settings.referral_pct} onBlur={ev=>saveSettings({referral_pct:+ev.target.value||0})}/></div>
        </div>
        <div className="field"><label>Ważność oferty</label>
          <div style={{display:"flex",gap:6,marginBottom:6}}>
            {[["hours","Godziny"],["days","Dni"],["until_date","Do daty"]].map(([v,l])=>(
              <span key={v} className={"chip"+(settings.offer_valid_mode===v?" on":"")} onClick={()=>saveSettings({offer_valid_mode:v})}>{l}</span>
            ))}
          </div>
          {settings.offer_valid_mode==='until_date'
            ? <input type="date" defaultValue={settings.offer_valid_date} onBlur={ev=>saveSettings({offer_valid_date:ev.target.value})}/>
            : <input type="number" defaultValue={settings.offer_valid_value} onBlur={ev=>saveSettings({offer_valid_value:+ev.target.value||0})} placeholder={settings.offer_valid_mode==='days'?'liczba dni':'liczba godzin'}/>}
        </div>
        <div className="field"><label>Numer telefonu do BLIK (zadatek)</label><input defaultValue={settings.blik_phone} onBlur={ev=>saveSettings({blik_phone:ev.target.value})}/></div>
        <div className="muted" style={{fontSize:11}}>Kaucja zwrotna ustawiasz osobno dla każdego sprzętu powyżej.</div>
      </div>
    </div>
  );
}

  id uuid primary key default gen_random_uuid(), created_at timestamptz default now(),
